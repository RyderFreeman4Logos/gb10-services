[server]
bind_host = "100.105.4.92"
port = 18009
max_in_flight_requests = 8
max_queued_generation_requests = 8
generation_queue_timeout_ms = 1800000
max_request_body_bytes = 67108864

[[listeners]]
name = "embedding-legacy"
bind_host = "100.105.4.92"
port = 18002
allowed_upstreams = ["qwen3-embedding-8b"]

[[listeners]]
name = "reranker-legacy"
bind_host = "100.105.4.92"
port = 18003
allowed_upstreams = ["qwen3-reranker-8b"]

[[listeners]]
name = "aggregate"
bind_host = "100.105.4.92"
port = 18005

[upstream]
base_url = "http://100.105.4.92:18010/v1"
request_timeout_ms = 1800000

[upstream.stall]
enabled = true
idle_timeout_ms = 120000

[upstream.metadata]
discovery_enabled = true
enrich_responses = true
refresh_interval_secs = 60

[[upstreams]]
name = "qwen3-embedding-8b"
base_url = "http://100.105.4.92:18012/v1"
match_models = ["qwen3-embedding-8b", "Qwen/Qwen3-Embedding-8B"]
request_timeout_ms = 1800000
max_in_flight_requests = 8
max_queued_generation_requests = 8

[upstreams.metadata]
discovery_enabled = true
enrich_responses = true
refresh_interval_secs = 60

[[upstreams]]
name = "qwen3-reranker-8b"
base_url = "http://100.105.4.92:18013/v1"
match_models = ["qwen3-reranker-8b", "Qwen/Qwen3-Reranker-8B"]
request_timeout_ms = 1800000
max_in_flight_requests = 8
max_queued_generation_requests = 8

[upstreams.metadata]
discovery_enabled = true
enrich_responses = true
refresh_interval_secs = 60

[shielding]
enabled = true

[observability]
enabled = true
sqlite_path = "/home/obj/.local/state/llm-guard-proxy/observability.sqlite3"
capture_raw_payloads = false
metrics_enabled = true
health_upstream_probe_enabled = true
health_upstream_probe_timeout_ms = 2000
debug_summary_enabled = false
debug_summary_max_records = 20

[observability.retention]
max_bytes = 1073741824
prune_to_bytes = 805306368
max_records = 100000
prune_to_records = 80000

[thinking]
enabled = true
force_disable = false
budget_tokens = 32768
preserve_answer_budget = true
tool_request_policy = "apply"

[loop_guard]
enabled = true
mode = "enforce"
normalized_input_window_secs = 120
max_repeated_inputs = 1
output_repeated_line_threshold = 24
output_token_window_size = 12
output_repeated_token_window_threshold = 32
output_suffix_cycle_threshold = 32
output_low_progress_min_bytes = 4096
output_low_progress_unique_ratio_percent = 15
input_overlap_threshold_multiplier = 4

[retry]
enabled = true
max_attempts = 3
anti_loop_hint_enabled = true
shielded_streaming_enabled = true
downstream_drop_policy = "cancel"

[[retry.ladder]]
name = "max-thinking"
thinking_mode = "force_thinking"
max_tokens = 50000
thinking_token_budget = 32768

[[retry.ladder]]
name = "bounded-thinking"
thinking_mode = "force_thinking"
max_tokens = 50000
thinking_token_budget = 8192
anti_loop_hint = "Previous attempt became repetitive. Do not repeat prior analysis; answer directly."

[[retry.ladder]]
name = "no-thinking"
thinking_mode = "force_disable"
max_tokens = 50000

[heartbeat]
mode = "sse"
interval_secs = 15

[cloudflare]
enabled = true
